name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            zip \
            unzip \
            autoconf \
            automake \
            autopoint \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            gettext \
            libltdl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip uninstall -y cython || true
          python -m pip install "Cython==0.29.33" "buildozer<2"

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = Word Duel
          package.name = wordduel
          package.domain = org.wordduel
          source.dir = .
          source.include_exts = py,png,jpg,jpeg,kv,atlas,txt,ttf,json
          version = 1.4
          requirements = python3,kivy,firebase-admin,aiohttp,pillow
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET
          android.api = 35
          android.minapi = 21
          android.ndk = 25b
          android.archs = arm64-v8a

          [buildozer]
          log_level = 2
          EOF

      - name: Clean previous build cache
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wordduel-apk
          path: bin/*.apk
